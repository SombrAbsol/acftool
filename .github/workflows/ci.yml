name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/ci.yml"
      - "src/**"
      - "include/**"
      - "Makefile"
  pull_request:
    branches: [ "main" ]
    paths:
      - ".github/workflows/ci.yml"
      - "src/**"
      - "include/**"
      - "Makefile"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TARGET: acftool

jobs:
  build:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, windows-2025]
        include:
          - os: ubuntu-24.04
            artifact-suffix: linux

          - os: macos-26
            artifact-suffix: macos

          - os: windows-2025
            artifact-suffix: windows

    name: Build acftool on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y llvm

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Build ${{ env.TARGET }}
        run: make CC=clang release

      - name: Upload ${{ env.TARGET }} artefact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.TARGET }}-${{ matrix.artifact-suffix }}
          path: |
            build/${{ env.TARGET }}*
            LICENSE
          if-no-files-found: error
          retention-days: 7

  release-latest:
    name: Update latest release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artefacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Package ZIPs
        run: |
          TARGET_NAME=$(make -pn CC=clang 2>/dev/null \
            | awk '/^TARGET_NAME :=/ { print $3 }')
          EXT=$(make -pn CC=clang 2>/dev/null \
            | awk '/^EXTENSION :=/ { print $3 }')

          declare -A OS_SUFFIX=(
            [ubuntu-24.04]=linux
            [macos-26]=macos
            [windows-2025]=windows
          )

          for os in "${!OS_SUFFIX[@]}"; do
            suffix="${OS_SUFFIX[$os]}"
            dir="artifacts/${TARGET_NAME}-${suffix}"

            mkdir -p "pkg/${suffix}"
            mv "${dir}/build/${TARGET_NAME}${EXT}" "pkg/${suffix}/"
            mv "${dir}/LICENSE"                    "pkg/${suffix}/"
            (cd "pkg/${suffix}" && zip "../../${TARGET_NAME}-${suffix}.zip" "${TARGET_NAME}${EXT}" LICENSE)
          done

      - name: Update latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          body: |
            Automated build from commit ${{ github.sha }}.
          files: pkg/*.zip
