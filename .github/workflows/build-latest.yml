name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "include/**"
      - "Makefile"
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "include/**"
      - "Makefile"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TARGET: acftool

jobs:
  build:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, windows-2025]
        include:
          - os: ubuntu-24.04
            artifact-suffix: linux
            extension: ""

          - os: macos-26
            artifact-suffix: macos
            extension: ""

          - os: windows-2025
            artifact-suffix: windows
            extension: .exe

    name: Build acftool on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y llvm

      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Build ${{ env.TARGET }}
        run: make CC=clang release

      - name: Upload ${{ env.TARGET }} artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARGET }}-${{ matrix.artifact-suffix }}
          path: |
            build/${{ env.TARGET }}${{ matrix.extension }}
            LICENSE
          if-no-files-found: error
